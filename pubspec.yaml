name: remind_ai
description: "RemindAI - AI Assistant with ToolShell, Skills, MCP and Memory"
publish_to: 'none'
version: 1.0.3+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.28

  # Networking
  dio: ^5.7.0

  # UI
  gpt_markdown:
    path: packages/gpt_markdown
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  dock_panel:
    path: packages/dock_panel

  # Node Flow Editor
  vyuh_node_flow: ^0.27.3
  mobx: ^2.4.0
  flutter_mobx: ^2.2.1

  # Rich Text Editor
  flutter_quill: ^11.5.1

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  archive: ^4.0.2
  file_picker: ^8.1.6
  # 目录选择改用 file_selector：Windows 上走现代 IFileDialog COM 接口，
  # 绕开 file_picker 依赖的旧 comdlg32.dll(在部分 Win10 环境会 0xc0000005 崩溃)。
  file_selector: ^1.0.3
  path: ^1.9.1
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1

  # Window Management
  window_manager: ^0.4.3
  tray_manager: ^0.5.3

  # System Notification
  local_notifier: ^0.1.6
  webview_windows: ^0.4.0
  fast_gbk: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/bin/
    - assets/default_skills/toolshell/
    - assets/default_skills/schedule/
    - assets/default_skills/system/
    - assets/web/
    - assets/icons/
    - assets/scripts/paddle_ocr/
    - assets/scripts/volcano_tts/
    - assets/pets/Cat/
    - assets/pets/Food/