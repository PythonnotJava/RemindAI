name: remind_ai
description: "RemindAI - AI Assistant with ToolShell, Skills, MCP and Memory"
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.28

  # Networking
  dio: ^5.7.0
  html: ^0.15.4

  # Anthropic SDK
  anthropic_sdk_dart: ^6.0.0

  # UI
  gpt_markdown:
    path: packages/gpt_markdown
  flutter_highlight:
    path: packages/flutter_highlight
  highlight:
    path: packages/highlight
  dock_panel:
    path: packages/dock_panel

  # Node Flow Editor
  vyuh_node_flow: ^0.27.3
  mobx: ^2.4.0
  flutter_mobx: ^2.2.1

  # Rich Text Editor
  flutter_quill: ^11.5.1

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  archive: ^4.0.2
  file_picker: ^8.1.6
  file_selector: ^1.0.3
  path: ^1.9.1
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1

  # 虚拟滚动 - 性能优化
  scrollable_positioned_list: ^0.3.8

  # Window Management
  window_manager: ^0.4.3
  tray_manager: ^0.5.3

  # System Notification
  local_notifier: ^0.1.6

  # WebView - 平台隔离，webview组件选不好会造成污染，我用flutter_inappwebview给我把Windows上的渲染搞崩了
  webview_windows: ^0.4.0  # Windows 专用
  webview_flutter: ^4.14.1  # macOS 专用（官方 Flutter 插件，不包含 Windows 支持）
  webview_all_linux: ^1.2.1  # Linux 专用（不包含 Windows 支持）

  fast_gbk: ^1.0.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/bin/
    - assets/default_skills/toolshell/
    - assets/default_skills/schedule/
    - assets/default_skills/system/
    - assets/web/
    - assets/icons/
    - assets/scripts/
    - assets/scripts/paddle_ocr/
    - assets/scripts/volcano_tts/
    # archify (draw architecture/workflow/sequence/etc diagrams,
    # invoked by the /archify-draw slash command via toolshell_exec).
    # Flutter's asset dir declarations do not recurse, list each level.
    - assets/scripts/archify/
    - assets/scripts/archify/assets/
    - assets/scripts/archify/examples/
    - assets/scripts/archify/schemas/
    - assets/scripts/archify/renderers/architecture/
    - assets/scripts/archify/renderers/dataflow/
    - assets/scripts/archify/renderers/lifecycle/
    - assets/scripts/archify/renderers/sequence/
    - assets/scripts/archify/renderers/shared/
    - assets/scripts/archify/renderers/workflow/
    - assets/pets/Cat/
    - assets/pets/Food/

